<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#3b82f6" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="description" content="Gym Douce - Application d'exercices physiques simples, doux et illustrés pour seniors. Fonctionne hors ligne." />
    <title>Gym Douce - Exercices Seniors</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => {
              console.log('Service Worker enregistré avec succès, scope:', reg.scope);
            })
            .catch((err) => {
              console.error('Échec de l\'enregistrement du Service Worker:', err);
            });
        });
      }
    </script>
  </body>
</html>
