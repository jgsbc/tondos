<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="%BASE_URL%icon-192.png" />
    <link rel="apple-touch-icon" href="%BASE_URL%icon-192.png" />
    <link rel="manifest" href="%BASE_URL%manifest.json" />
    <meta name="theme-color" content="#3b82f6" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="description" content="Tondos — La Brigade Élastique. Le programme officiel du daron souple, solide et légèrement dangereux avec un élastique. Application hors ligne." />
    <title>Tondos — La Brigade Élastique</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          const basePath = new URL('%BASE_URL%', window.location.href).pathname;
          navigator.serviceWorker.register(`${basePath}sw.js`, { scope: basePath })
            .then((reg) => {
              console.log('Service Worker enregistré avec succès, scope:', reg.scope);
            })
            .catch((err) => {
              console.error('Échec de l\'enregistrement du Service Worker:', err);
            });
        });
      }
    </script>
  </body>
</html>
